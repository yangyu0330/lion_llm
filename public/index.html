<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>두 챗봇 실습</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">CB</div>
          <div>
            <strong>두 챗봇 실습</strong>
            <span>Ollama + 로컬 게임</span>
          </div>
        </div>

        <div class="bot-switch" role="tablist" aria-label="챗봇 선택">
          <button class="bot-option active" type="button" data-bot-id="maid">
            <strong>나는 너의 메이드</strong>
            <span>기분 회복</span>
          </button>
          <button class="bot-option" type="button" data-bot-id="number-updown">
            <strong>숫자 업다운</strong>
            <span>1부터 100까지</span>
          </button>
        </div>

        <button class="new-chat" id="newChatButton" type="button">
          <span>+</span>
          새 대화
        </button>

        <div class="session-panel">
          <div class="sidebar-label">대화 기록</div>
          <div class="session-list" id="sessionList">
            <div class="session-empty">저장된 대화가 없습니다.</div>
          </div>
        </div>

        <div class="settings">
          <label for="modelSelect">Ollama 모델</label>
          <select id="modelSelect">
            <option value="">챗봇 기본 모델 사용</option>
          </select>

          <label for="temperatureRange">
            창의성 <span id="temperatureValue">0.7</span>
          </label>
          <input
            id="temperatureRange"
            type="range"
            min="0"
            max="1.5"
            step="0.1"
            value="0.7"
          />
        </div>

        <div class="prompt-note">
          챗봇 설정은 <code>prompts/chatbots.json</code>에서 관리합니다.
        </div>
      </aside>

      <main class="chat">
        <header class="chat-header">
          <div>
            <h1 id="chatTitle">나는 너의 메이드</h1>
            <p id="chatSubtitle">기분을 풀어주는 공손한 메이드 챗봇</p>
          </div>
          <div class="status" id="status">준비 중</div>
        </header>

        <section class="messages" id="messages" aria-live="polite"></section>

        <form class="composer" id="chatForm">
          <textarea
            id="promptInput"
            rows="1"
            placeholder="메시지를 입력하세요"
            autocomplete="off"
          ></textarea>
          <button id="sendButton" type="submit" aria-label="전송">
            <span>↑</span>
          </button>
        </form>
      </main>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
